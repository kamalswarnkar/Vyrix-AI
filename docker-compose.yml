version: "3.9"

# ─────────────────────────────────────────────────────────────
# Vyrix AI — local Docker stack
#
#   Services
#   ────────
#   ollama        local LLM + embedding server (CPU or GPU)
#   ollama-init   one-shot container that pulls required models
#   vyrix         Next.js application
#
#   Volumes
#   ───────
#   ollama_data   Ollama model cache
#   vyrix_data    SQLite DB + uploads + FAISS indexes
#
#   Quick start
#   ───────────
#   docker compose up -d
#
#   GPU (NVIDIA) override
#   ─────────────────────
#   docker compose --profile gpu up -d
# ─────────────────────────────────────────────────────────────

volumes:
  ollama_data:
  vyrix_data:

networks:
  vyrix_net:
    driver: bridge

services:
  # ── Ollama: local LLM + embedding runtime ──────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: vyrix-ollama
    restart: unless-stopped
    networks:
      - vyrix_net
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Ollama GPU variant (NVIDIA only) ───────────────────────
  ollama-gpu:
    profiles: ["gpu"]
    image: ollama/ollama:latest
    container_name: vyrix-ollama-gpu
    restart: unless-stopped
    networks:
      - vyrix_net
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Init: pull required models once, then exit ─────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: vyrix-ollama-init
    restart: "no"
    networks:
      - vyrix_net
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Pulling chat model: llama3.2:3b-instruct"
        ollama pull llama3.2:3b-instruct
        echo "==> Pulling embedding model: nomic-embed-text"
        ollama pull nomic-embed-text
        echo "==> Done"
        ollama list

  # ── Vyrix: Next.js application ─────────────────────────────
  vyrix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyrix-app
    restart: unless-stopped
    networks:
      - vyrix_net
    ports:
      - "${VYRIX_HOST_PORT:-3000}:3000"
    volumes:
      - vyrix_data:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1

      # Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_CHAT_MODEL=llama3.2:3b-instruct
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text

      # Paths (all under the vyrix_data volume)
      - VYRIX_SQLITE_PATH=/app/data/vyrix.sqlite
      - VYRIX_UPLOAD_STORAGE_ROOT=/app/data/uploads
      - VYRIX_FAISS_INDEX_DIR=/app/data/faiss
      - VYRIX_WORKSPACE_ROOT=/app/data/workspace

      # Tuning
      - AI_REQUEST_TIMEOUT_MS=${AI_REQUEST_TIMEOUT_MS:-180000}
      - AI_HEALTH_TIMEOUT_MS=${AI_HEALTH_TIMEOUT_MS:-5000}
      - AI_CHAT_HISTORY_LIMIT=${AI_CHAT_HISTORY_LIMIT:-20}

    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/ai/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
